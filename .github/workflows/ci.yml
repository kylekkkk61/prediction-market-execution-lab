name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Ruff and pytest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev --extra notebook --extra dashboard --extra ml

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run tests
        env:
          PYTHONPATH: src
        run: uv run pytest
